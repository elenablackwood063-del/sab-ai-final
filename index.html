<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sab Kuch Bolo AI - Uncensored</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 500px; background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); }
        h1 { text-align: center; color: #ff0055; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p.tagline { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; font-style: italic; }
        #response { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 20px; min-height: 100px; line-height: 1.6; border-left: 4px solid #ff0055; white-space: pre-wrap; font-size: 16px; }
        textarea { width: 100%; height: 100px; padding: 12px; background: #333; color: white; border: 1px solid #444; border-radius: 10px; outline: none; box-sizing: border-box; resize: none; font-size: 15px; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #ff0055; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff3377; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <h1>SAB KUCH BOLO AI</h1>
        <p class="tagline">कोई पाबंदी नहीं, कोई सेंसर नहीं - सिर्फ बेबाक बातें</p>
        <div id="response">यहाँ आपकी बेबाक कहानी या सवाल का जवाब दिखेगा...</div>
        <textarea id="userInput" placeholder="अपनी 18+, बोल्ड या कोई भी बेबाक बात यहाँ लिखें..."></textarea>
        <button onclick="askAI()">AI से बात करें</button>
    </div>

    <script>
        // यह स्क्रिप्ट सीधे आपके AI के दिमाग से बात करेगी
        async function askAI() {
            const input = document.getElementById('userInput').value;
            const resBox = document.getElementById('response');
            
            if(!input) { alert("पहले कुछ लिखो तो सही भाई!"); return; }

            resBox.innerText = "मसालेदार जवाब तैयार कर रहा हूँ...";

            // यहाँ आपका AI रिस्पॉन्स देगा (अगले स्टेप में इसे लाइव करेंगे)
            resBox.innerText = "नमस्ते! मैं 'सब कुछ बोलो AI' हूँ। मैं तैयार हूँ हर तरह की बोल्ड और 18+ बातें करने के लिए। बस मुझे अपने Vercel API से एक बार जोड़ दीजिये, फिर देखिए जलवा!";
        }
    </script>
</body>
</html>
